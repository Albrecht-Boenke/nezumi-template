<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>shadcn/ui Button — Deep Dive Tutorial</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d1117;color:#e6edf3;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#161b22;}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  button:focus{outline:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const KW = new Set(['import','export','from','const','let','var','function',
  'return','type','interface','default','true','false','null','undefined',
  'async','await','if','else','new','class','extends','typeof','in','of'])
function tokenize(src) {
  const toks = []; let i = 0
  while (i < src.length) {
    if (src[i]==='/' && src[i+1]==='/') {
      let j=i; while(j<src.length && src[j]!=='\n') j++
      toks.push({t:'cmt',v:src.slice(i,j)}); i=j; continue
    }
    if (src[i]==='"'||src[i]==="'") {
      const q=src[i]; let j=i+1
      while(j<src.length){if(src[j]==='\\'){j+=2;continue}if(src[j]===q){j++;break}j++}
      toks.push({t:'str',v:src.slice(i,j)}); i=j; continue
    }
    if (src[i]==='`') {
      let j=i+1
      while(j<src.length){if(src[j]==='\\'){j+=2;continue}if(src[j]==='`'){j++;break}j++}
      toks.push({t:'str',v:src.slice(i,j)}); i=j; continue
    }
    if (/[a-zA-Z_$]/.test(src[i])) {
      let j=i; while(j<src.length&&/[\w$]/.test(src[j]))j++
      const w=src.slice(i,j)
      toks.push({t:KW.has(w)?'kw':/^[A-Z]/.test(w)?'typ':'id',v:w}); i=j; continue
    }
    if (/\d/.test(src[i])) {
      let j=i; while(j<src.length&&/[\d.]/.test(src[j]))j++
      toks.push({t:'num',v:src.slice(i,j)}); i=j; continue
    }
    toks.push({t:'pun',v:src[i]}); i++
  }
  return toks
}
function groupLines(tokens) {
  const lines = [[]]
  for (const t of tokens) {
    if (t.t==='pun' && t.v==='\n') lines.push([])
    else lines[lines.length-1].push(t)
  }
  return lines
}
const TC = {cmt:'#6e7681',str:'#a5d6ff',kw:'#ff7b72',typ:'#d2a8ff',id:'#e6edf3',num:'#79c0ff',pun:'#8b949e'}

const BTN_SRC = `import * as React from "react"
import { Slot } from "@radix-ui/react-slot"              // ① Slot / asChild
import { cva, type VariantProps } from "class-variance-authority"  // ② CVA
import { cn } from "@/lib/utils"                          // ③ cn()
const buttonVariants = cva(                              // ④ Variant-Factory
  // BASE — immer aktiv, egal welcher variant/size
  "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-all disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none shrink-0 outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:border-destructive",
  {
    variants: {
      variant: {                                         // ⑤ Stil-Dimension
        default:     "bg-primary text-primary-foreground shadow-xs hover:bg-primary/90",
        destructive: "bg-destructive text-white shadow-xs hover:bg-destructive/90",
        outline:     "border bg-background shadow-xs hover:bg-accent hover:text-accent-foreground",
        secondary:   "bg-secondary text-secondary-foreground shadow-xs hover:bg-secondary/80",
        ghost:       "hover:bg-accent hover:text-accent-foreground",
        link:        "text-primary underline-offset-4 hover:underline",
      },
      size: {                                            // ⑥ Größen-Dimension
        default: "h-9 px-4 py-2 has-[>svg]:px-3",
        sm:      "h-8 rounded-md gap-1.5 px-3 has-[>svg]:px-2.5",
        lg:      "h-10 rounded-md px-6 has-[>svg]:px-4",
        icon:    "size-9",
      },
    },
    defaultVariants: { variant: "default", size: "default" }, // ⑦ Fallbacks
  }
)
function Button({ className, variant, size, asChild = false, ...props }) {
  const Comp = asChild ? Slot : "button"                // ⑧ dynamisches Element
  return (
    <Comp
      data-slot="button"                               // ⑨ CSS-Targeting-Hook
      className={cn(buttonVariants({ variant, size, className }))}  // ⑩ Merge
      {...props}                                        // ⑪ Prop-Forwarding
    />
  )
}
export { Button, buttonVariants }                      // ⑫ named exports`

const ANNOTATIONS = [
  { id:1, marker:'①', lines:[2], color:'#58a6ff', title:'Radix UI Slot — das asChild-Pattern',
    body:'Slot ist kein DOM-Element. Er merged seine Props auf das erste Kind und verschwindet aus dem DOM. Damit kann Button als <a>, <Link> oder jedes andere Element rendern — ohne doppelte DOM-Knoten.',
    code:`// ❌ Ohne asChild: verschachtelt\n<Button><a href="/home">Home</a></Button>\n// DOM → <button><a>Home</a></button>\n// ✅ Mit asChild: ein Element, alle Button-Klassen\n<Button asChild><a href="/home">Home</a></Button>\n// DOM → <a class="inline-flex ... btn-classes">Home</a>`},
  { id:2, marker:'②', lines:[3], color:'#d2a8ff', title:'class-variance-authority (CVA)',
    body:'CVA nimmt ein Konfigurations-Objekt und gibt eine Funktion zurück. Diese Funktion kalkuliert basierend auf den Props den finalen className-String. Kein Runtime-Overhead, kein Tailwind-Purge-Problem.',
    code:`// cva() returns eine Funktion\nconst variants = cva(base, config)\n// Aufruf der Funktion → className string\nvariants({ variant: "outline", size: "sm" })\n// → "inline-flex ... border bg-background ... h-8 px-3"`},
  { id:3, marker:'③', lines:[4], color:'#3fb950', title:'cn() — der Klassen-Merger',
    body:'cn() kombiniert clsx (conditional classes) und tailwind-merge (Konflikt-Auflösung). Tailwind-merge ist entscheidend: es verhindert, dass widersprüchliche Klassen wie "p-4" und "px-2" beide aktiv sind.',
    code:`import { clsx } from "clsx"\nimport { twMerge } from "tailwind-merge"\nexport function cn(...inputs) {\n  return twMerge(clsx(inputs))\n}\n// Beispiel:\ncn("p-4", "px-2")          // → "p-4 px-2" ← px-2 overrides px\ncn("bg-red-500", isActive && "bg-blue-500") // conditional`},
  { id:4, marker:'④', lines:[6], color:'#f0b429', title:'cva() — die Variant-Factory',
    body:'cva() nimmt zwei Argumente: (1) den Base-String der immer angewendet wird, und (2) ein Config-Objekt mit variants, compoundVariants und defaultVariants. Das Ergebnis ist eine typsichere Funktion.',
    code:`const buttonVariants = cva(\n  "base-classes-always-applied",  // ← arg 1: base\n  {\n    variants: { ... },             // ← arg 2: config\n    defaultVariants: { ... },\n  }\n)\n// typeof buttonVariants = (props?) => string`},
  { id:5, marker:'⑤', lines:[13,14,15,16,17,18,19,20], color:'#ff7b72', title:'variant — die Stil-Dimension',
    body:'Jeder Key in variant definiert eine visuelle "Persönlichkeit" des Buttons. Der Wert ist ein className-String mit ausschließlich semantischen Tailwind-Tokens — niemals raw Farben wie "bg-blue-500".',
    code:`// ✅ Semantic tokens — reagiert auf Theme-Änderungen\ndefault: "bg-primary text-primary-foreground"\n// ❌ Raw colors — ignoriert das Theme-System\ndefault: "bg-blue-600 text-white"`},
  { id:6, marker:'⑥', lines:[21,22,23,24,25,26], color:'#ffa657', title:'size — die Größen-Dimension',
    body:'size kontrolliert ausschließlich dimensionale Aspekte: Höhe, Padding, Gap. Der has-[>svg]: Selektor ist modern CSS: er reduziert automatisch das Padding wenn ein SVG-Icon direkt im Button ist.',
    code:`// has-[>svg]:px-3 bedeutet:\n// "wenn ein direktes svg-Kind existiert → px-3 statt px-4"\n<Button size="default">Text</Button>        // px-4\n<Button size="default"><Icon/>Text</Button>  // px-3 (enger, weil Icon)`},
  { id:7, marker:'⑦', lines:[28], color:'#3fb950', title:'defaultVariants — die Fallbacks',
    body:'Ohne explizite Props greift defaultVariants. Das ist wichtig: <Button> ohne Attribute rendert als "default" Variant in "default" Size. TypeScript-Consumers erhalten alle Props als optional.',
    code:`// Alle drei sind äquivalent:\n<Button />\n<Button variant="default" />\n<Button variant="default" size="default" />`},
  { id:8, marker:'⑧', lines:[31], color:'#58a6ff', title:'Comp — dynamisches Element',
    body:'Diese eine Zeile ist der asChild-Switch. Wenn asChild=true wird Radix Slot verwendet (der seine Props auf das Kind merged). Sonst ein normaler <button>. Elegant: null Conditional-Rendering im JSX.',
    code:`const Comp = asChild ? Slot : "button"\n// Comp ist entweder die Slot-Komponente oder der String "button"\n// React kann beides als JSX-Element verwenden: <Comp .../>`},
  { id:9, marker:'⑨', lines:[33], color:'#d2a8ff', title:'data-slot="button" — CSS-Targeting',
    body:'data-slot ist ein Konvention-Attribut von shadcn/ui. Eltern-Komponenten können damit gezielt Kind-Komponenten ansprechen, ohne auf CSS-Klassen angewiesen zu sein. Stabil gegenüber className-Änderungen.',
    code:`/* In einer parent Card-Komponente: */\n.card [data-slot="button"] {\n  width: 100%;  /* alle Buttons in Cards werden full-width */\n}\n/* Auch in Tailwind v4 mit @variant: */\n@variant card-btn { &:is([data-slot="button"]) }`},
  { id:10, marker:'⑩', lines:[34], color:'#f0b429', title:'cn(buttonVariants({...})) — der Merge-Punkt',
    body:'Das ist das Herzstück. buttonVariants() berechnet den className aus base+variant+size. cn() merged dann den externen className (vom Nutzer übergeben) — mit Tailwind-Merge-Konfliktlösung.',
    code:`// Schritt für Schritt:\nbuttonVariants({ variant: "outline", size: "sm" })\n// → "inline-flex ... border bg-background ... h-8 px-3"\ncn(\n  "inline-flex ... border ... h-8 px-3",  // ← von buttonVariants\n  "mt-4 w-full"                             // ← externer className-prop\n)\n// → "inline-flex ... border ... h-8 px-3 mt-4 w-full"`},
  { id:11, marker:'⑪', lines:[35], color:'#3fb950', title:'{...props} — Prop-Forwarding',
    body:'Spread-Operator: alle nicht-destrukturierten Props (onClick, disabled, aria-*, data-*, type...) landen direkt auf dem <button>. Das macht Button transparent für alle nativen HTML-Attribute.',
    code:`// Diese Props werden alle weitergeleitet:\n<Button\n  onClick={() => handleSubmit()}\n  disabled={isLoading}\n  aria-label="Formular abschicken"\n  data-testid="submit-btn"\n  type="submit"\n>\n  Absenden\n</Button>`},
  { id:12, marker:'⑫', lines:[39], color:'#ff7b72', title:'named exports — buttonVariants auch exportieren',
    body:'buttonVariants wird separat exportiert, damit andere Komponenten den gleichen Variant-Stil nutzen können ohne den Button zu importieren. Klassisches Beispiel: ein Link-Element das wie ein Button aussehen soll.',
    code:`import { buttonVariants } from "@/components/ui/button"\nimport Link from "next/link"\n// Ein <a>-Tag mit Button-Stil, kein Radix-Overhead\n<Link href="/dashboard" className={buttonVariants({ variant: "outline" })}>\n  Dashboard\n</Link>`},
]

const A = {
  bg: '#0d1117', surface: '#161b22', border: '#21262d',
  borderHover: '#30363d', text: '#e6edf3', muted: '#7d8590',
  amber: '#f0b429', blue: '#58a6ff', green: '#3fb950',
  purple: '#d2a8ff', red: '#ff7b72', orange: '#ffa657',
  code: '#161b22', mono: "'JetBrains Mono', 'Fira Code', monospace",
  sans: "'Sora', 'DM Sans', sans-serif",
}

function Tag({ color='#7d8590', children, style={} }) {
  return <span style={{
    background: color+'22', color, border: `1px solid ${color}44`,
    borderRadius:4, padding:'1px 7px', fontSize:11, fontWeight:600,
    letterSpacing:.5, fontFamily:A.mono, ...style
  }}>{children}</span>
}

function SyntaxCode({ code, highlightLines=[], style={} }) {
  const lines = useMemo(() => groupLines(tokenize(code)), [code])
  return (
    <pre style={{
      margin:0, padding:'16px 20px', background:'#0d1117',
      borderRadius:8, overflow:'auto', fontFamily:A.mono,
      fontSize:12.5, lineHeight:1.75, ...style
    }}>
      {lines.map((line, li) => {
        const isHL = highlightLines.includes(li+1)
        return (
          <div key={li} style={{
            background: isHL ? 'rgba(240,180,41,0.12)' : 'transparent',
            borderLeft: isHL ? '2px solid #f0b429' : '2px solid transparent',
            paddingLeft: isHL ? 6 : 8, marginLeft: -8,
            transition:'all .15s'
          }}>
            <span style={{color:'#484f58',width:28,display:'inline-block',
              userSelect:'none',fontSize:11}}>{li+1}</span>
            {line.map((t,ti) => (
              <span key={ti} style={{color:TC[t.t]}}>{t.v}</span>
            ))}
          </div>
        )
      })}
    </pre>
  )
}

function SmallCode({ children }) {
  return (
    <code style={{
      background:'#1c2128', color:'#a5d6ff', padding:'1px 6px',
      borderRadius:4, fontFamily:A.mono, fontSize:12
    }}>{children}</code>
  )
}

function Section({ title, subtitle, children, style={} }) {
  return (
    <div style={{ marginBottom:40, ...style }}>
      <h2 style={{
        fontSize:20, fontWeight:700, color:A.text, marginBottom:4,
        fontFamily:A.sans, letterSpacing:-.3
      }}>{title}</h2>
      {subtitle && <p style={{color:A.muted, fontSize:13.5, marginBottom:20, lineHeight:1.6}}>{subtitle}</p>}
      {!subtitle && <div style={{height:20}}/>}
      {children}
    </div>
  )
}

function CalloutBox({ color=A.amber, label, children }) {
  return (
    <div style={{
      background:`${color}0f`, border:`1px solid ${color}30`,
      borderRadius:8, padding:'14px 18px', marginTop:12
    }}>
      <div style={{color, fontWeight:700, fontSize:11, letterSpacing:.8,
        fontFamily:A.mono, marginBottom:6}}>{label}</div>
      <div style={{color:A.text, fontSize:13.5, lineHeight:1.65}}>{children}</div>
    </div>
  )
}

function AnatomyChapter() {
  const [activeAnn, setActiveAnn] = useState(null)
  const active = ANNOTATIONS.find(a => a.id === activeAnn)
  const hlLines = active ? active.lines : []
  return (
    <div>
      <Section
        title="Die Anatomie des Button"
        subtitle="Der shadcn/ui Button ist ~40 Zeilen Code — aber jede Zeile hat eine präzise Aufgabe. Klicke auf eine Annotation (①②③…) um die Erklärung zu sehen."
      >
        <div style={{display:'grid', gridTemplateColumns:'1fr 340px', gap:16, alignItems:'start'}}>
          <div style={{border:`1px solid ${A.border}`, borderRadius:10, overflow:'hidden'}}>
            <div style={{background:'#161b22', padding:'10px 16px', borderBottom:`1px solid ${A.border}`,
              display:'flex', alignItems:'center', gap:8}}>
              <span style={{fontFamily:A.mono, fontSize:12, color:A.muted}}>components/ui/button.tsx</span>
            </div>
            <SyntaxCode code={BTN_SRC} highlightLines={hlLines} />
          </div>
          <div>
            <div style={{
              background:'#161b22', border:`1px solid ${A.border}`,
              borderRadius:10, overflow:'hidden', marginBottom:8
            }}>
              <div style={{padding:'12px 16px', borderBottom:`1px solid ${A.border}`}}>
                <span style={{fontSize:12, fontWeight:700, color:A.muted, letterSpacing:.5}}>ANNOTATIONEN</span>
              </div>
              <div style={{padding:8}}>
                {ANNOTATIONS.map(ann => (
                  <button key={ann.id} onClick={() => setActiveAnn(activeAnn===ann.id ? null : ann.id)}
                    style={{
                      display:'flex', alignItems:'center', gap:10, width:'100%',
                      background: activeAnn===ann.id ? `${ann.color}18` : 'transparent',
                      border: activeAnn===ann.id ? `1px solid ${ann.color}44` : '1px solid transparent',
                      borderRadius:6, padding:'7px 10px', cursor:'pointer',
                      textAlign:'left', transition:'all .15s', marginBottom:3
                    }}
                  >
                    <span style={{
                      color: ann.color, fontFamily:A.mono, fontSize:14,
                      fontWeight:700, width:20, flexShrink:0
                    }}>{ann.marker}</span>
                    <span style={{
                      color: activeAnn===ann.id ? A.text : A.muted,
                      fontSize:12, lineHeight:1.4, fontFamily:A.sans
                    }}>{ann.title.length > 32 ? ann.title.slice(0,32)+'…' : ann.title}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
        {active && (
          <div style={{
            marginTop:16, border:`1px solid ${active.color}44`,
            background:`${active.color}0a`, borderRadius:10, padding:20,
            animation:'fadeIn .2s ease'
          }}>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
              <span style={{fontFamily:A.mono, fontSize:22, color:active.color, fontWeight:700}}>{active.marker}</span>
              <h3 style={{fontSize:16, fontWeight:700, color:A.text, fontFamily:A.sans}}>{active.title}</h3>
            </div>
            <p style={{color:'#c9d1d9', fontSize:13.5, lineHeight:1.7, marginBottom:16}}>{active.body}</p>
            <div style={{border:`1px solid ${A.border}`, borderRadius:8, overflow:'hidden'}}>
              <div style={{background:'#161b22',padding:'8px 14px', borderBottom:`1px solid ${A.border}`,
                display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontFamily:A.mono,fontSize:11,color:A.muted}}>Beispiel</span>
              </div>
              <SyntaxCode code={active.code} />
            </div>
          </div>
        )}
      </Section>
      <Section title="Der 3-Schichten Aufbau" subtitle="Jede Zeile gehört zu einer von drei klaren Verantwortlichkeiten.">
        {[
          { color:A.amber, label:'LAYER 1 — IMPORTS', lines:'1–4',
            desc:'Externe Dependencies: React, Radix Slot für asChild, CVA für Variants, cn() für Klassen-Merge. Bewusst minimalistisch — kein State, kein Context, kein global Store.' },
          { color:A.blue, label:'LAYER 2 — VARIANT FACTORY', lines:'6–30',
            desc:'buttonVariants ist eine reine Funktion ohne Side-Effects. Input: Props-Objekt. Output: className-String. Diese Funktion wird separat exportiert damit andere Komponenten (z.B. <Link>) den gleichen Stil nutzen können.' },
          { color:A.green, label:'LAYER 3 — COMPONENT', lines:'32–38',
            desc:'Die React-Komponente ist bewusst schlank: sie delegiert die gesamte Klassen-Logik an buttonVariants. Ihre einzige Aufgabe: das DOM-Element wählen (button vs Slot) und Props weiterleiten.' },
        ].map(l => (
          <div key={l.label} style={{
            display:'flex', gap:16, padding:'14px 18px', marginBottom:8,
            background:'#161b22', border:`1px solid ${A.border}`, borderRadius:8,
            borderLeft:`3px solid ${l.color}`
          }}>
            <div style={{flexShrink:0}}>
              <Tag color={l.color}>{l.label}</Tag>
              <div style={{color:A.muted,fontFamily:A.mono,fontSize:11,marginTop:4}}>Zeilen {l.lines}</div>
            </div>
            <p style={{color:'#c9d1d9', fontSize:13.5, lineHeight:1.65, marginTop:0}}>{l.desc}</p>
          </div>
        ))}
      </Section>
    </div>
  )
}

const CVA_VARIANTS = ['default','destructive','outline','secondary','ghost','link']
const CVA_SIZES = ['default','sm','lg','icon']
const CVA_CLASSES = {
  base: 'inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium transition-all disabled:pointer-events-none disabled:opacity-50',
  variant: {
    default: 'bg-primary text-primary-foreground shadow-xs hover:bg-primary/90',
    destructive: 'bg-destructive text-white shadow-xs hover:bg-destructive/90',
    outline: 'border bg-background shadow-xs hover:bg-accent hover:text-accent-foreground',
    secondary: 'bg-secondary text-secondary-foreground shadow-xs hover:bg-secondary/80',
    ghost: 'hover:bg-accent hover:text-accent-foreground',
    link: 'text-primary underline-offset-4 hover:underline',
  },
  size: {
    default: 'h-9 px-4 py-2 has-[>svg]:px-3',
    sm: 'h-8 rounded-md gap-1.5 px-3',
    lg: 'h-10 rounded-md px-6',
    icon: 'size-9',
  }
}
const VARIANT_STYLES = {
  default: { bg:'#3b82f6', fg:'#fff', border:'none', hoverBg:'#2563eb' },
  destructive: { bg:'#ef4444', fg:'#fff', border:'none', hoverBg:'#dc2626' },
  outline: { bg:'transparent', fg:'#e6edf3', border:'1px solid #30363d', hoverBg:'#21262d' },
  secondary: { bg:'#21262d', fg:'#e6edf3', border:'none', hoverBg:'#30363d' },
  ghost: { bg:'transparent', fg:'#e6edf3', border:'none', hoverBg:'#21262d' },
  link: { bg:'transparent', fg:'#58a6ff', border:'none', hoverBg:'transparent' },
}
const SIZE_STYLES = {
  default: { height:36, padding:'0 16px', fontSize:14 },
  sm: { height:32, padding:'0 12px', fontSize:13 },
  lg: { height:40, padding:'0 24px', fontSize:15 },
  icon: { height:36, width:36, padding:0, fontSize:14 },
}

function CVAChapter() {
  const [selVariant, setSelVariant] = useState('default')
  const [selSize, setSelSize] = useState('default')
  const [hover, setHover] = useState(false)
  const vs = VARIANT_STYLES[selVariant]
  const ss = SIZE_STYLES[selSize]
  return (
    <div>
      <Section title="CVA — die Variant-Engine"
        subtitle="class-variance-authority (CVA) ist das Herzstück. Verstehe CVA, verstehst du alle shadcn/ui Komponenten.">
        <CalloutBox color={A.purple} label="KERN-KONZEPT">
          CVA ist eine <strong>Funktion, die eine Funktion zurückgibt</strong>. Du konfigurierst sie einmalig mit Variants — und rufst die resultierende Funktion dann bei jedem Render auf, um den finalen <SmallCode>className</SmallCode>-String zu erhalten.
        </CalloutBox>
        <div style={{marginTop:20}}>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:16}}>

    body:`dark:bg-gray-800 manuell setzen ist falsch. bg-background handled Dark Mode automatisch via CSS-Variable.` },
  { icon:'❌', color:A.red, title:'Kein manueller z-index auf Overlays',
    body:`Dialog, Popover, Tooltip etc. managen ihren eigenen Stack. z-50 oder z-[999] manuell setzen verursacht Konflikte.` },
]

function FileTreeChapter() {
  const [activeFile, setActiveFile] = useState(null)
  const af = FILE_TREE.find(f => f.name === activeFile)
  return (
    <div>
      <Section title="File-Struktur & Best Practices"
        subtitle="Wo lebt was — und was ändert man wo.">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start'}}>
          <div style={{
            background:'#161b22', border:`1px solid ${A.border}`,
            borderRadius:10, overflow:'hidden'
          }}>
            <div style={{padding:'10px 16px',borderBottom:`1px solid ${A.border}`}}>
              <span style={{fontFamily:A.mono,fontSize:12,color:A.muted}}>Projekt-Struktur</span>
            </div>
            <div style={{padding:12}}>
              {FILE_TREE.map((f,i) => (
                <div key={i}
                  onClick={() => f.desc ? setActiveFile(activeFile===f.name ? null : f.name) : null}
                  style={{
                    display:'flex', alignItems:'center', gap:6,
                    padding:'5px 8px', paddingLeft: 8 + f.depth * 18,
                    borderRadius:6, cursor: f.desc ? 'pointer' : 'default',
                    background: activeFile===f.name ? `${f.color||A.border}18` : 'transparent',
                    marginBottom:1
                  }}>
                  <span style={{fontSize:13}}>{f.type==='dir' ? '📁' : '📄'}</span>
                  <span style={{
                    fontFamily:A.mono, fontSize:12,
                    color: f.color || (f.type==='dir' ? '#e6edf3' : A.muted),
                    fontWeight: activeFile===f.name ? 700 : 400
                  }}>{f.name}</span>
                  {f.desc && <span style={{color:A.muted,fontSize:10}}>←</span>}
                </div>
              ))}
            </div>
          </div>
          <div>
            {af ? (
              <div style={{
                background:'#161b22', border:`1px solid ${af.color}44`,
                borderRadius:10, padding:18
              }}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                  <span style={{fontSize:16}}>📄</span>
                  <span style={{fontFamily:A.mono,fontSize:13,color:af.color,fontWeight:700}}>{af.name}</span>
                </div>
                <p style={{color:'#c9d1d9',fontSize:13.5,lineHeight:1.7}}>{af.desc}</p>
              </div>
            ) : (
              <div style={{
                background:'#161b22', border:`1px solid ${A.border}`,
                borderRadius:10, padding:18,
                display:'flex',alignItems:'center',justifyContent:'center',
                minHeight:120
              }}>
                <span style={{color:A.muted,fontSize:13}}>← Klicke auf eine Datei</span>
              </div>
            )}
            <div style={{
              marginTop:12, background:'#161b22', border:`1px solid ${A.border}`,
              borderRadius:10, padding:16
            }}>
              <div style={{fontSize:12,fontWeight:700,color:A.muted,letterSpacing:.8,
                fontFamily:A.mono,marginBottom:12}}>ÄNDERUNGSGUIDE</div>
              {[
                { file:'globals.css', change:'Theme-Farben, Radius, Custom Tokens', freq:'Selten' },
                { file:'button.tsx', change:'Neue Variants, Compound Variants', freq:'Manchmal' },
                { file:'utils.ts', change:'Niemals verändern', freq:'Nie' },
              ].map(g => (
                <div key={g.file} style={{
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'6px 0', borderBottom:`1px solid ${A.border}19`
                }}>
                  <SmallCode>{g.file}</SmallCode>
                  <span style={{color:'#c9d1d9',fontSize:12,flex:1,padding:'0 12px'}}>{g.change}</span>
                  <Tag color={g.freq==='Nie' ? A.red : g.freq==='Selten' ? A.green : A.amber}>
                    {g.freq}
                  </Tag>
                </div>
              ))}
            </div>
          </div>
        </div>
      </Section>
      <Section title="Best Practices — Quick Reference">
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {BEST_PRACTICES.map((p,i) => (
            <div key={i} style={{
              background:'#161b22', border:`1px solid ${A.border}`,
              borderLeft:`3px solid ${p.color}`, borderRadius:8, padding:14
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:14}}>{p.icon}</span>
                <span style={{color:p.color,fontSize:12,fontWeight:700}}>{p.title}</span>
              </div>
              <p style={{color:A.muted,fontSize:12.5,lineHeight:1.6,margin:0}}>{p.body}</p>
            </div>
          ))}
        </div>
      </Section>
    </div>
  )
}

const CHAPTERS = [
  { id:'anatomy', emoji:'🔬', label:'01 · Anatomie' },
  { id:'cva', emoji:'⚙️', label:'02 · CVA Engine' },
  { id:'tokens', emoji:'🎨', label:'03 · Token System' },
  { id:'customize', emoji:'🛠️', label:'04 · Customization' },
  { id:'filetree', emoji:'📁', label:'05 · Struktur & BP' },
]

function App() {
  const [chapter, setChapter] = useState('anatomy')
  return (
    <div style={{ background:A.bg, minHeight:'100vh', fontFamily:A.sans, color:A.text }}>
      <div style={{
        borderBottom:`1px solid ${A.border}`, padding:'14px 28px',
        display:'flex', alignItems:'center', gap:12, position:'sticky', top:0,
        background:A.bg, zIndex:10
      }}>
        <div style={{
          background:A.amber, color:'#0d1117', padding:'3px 10px',
          borderRadius:4, fontWeight:800, fontSize:11, letterSpacing:1.5,
          fontFamily:A.mono
        }}>SHADCN/UI</div>
        <div style={{width:1, height:18, background:A.border}}/>
        <span style={{fontSize:14, fontWeight:600, color:A.text}}>Button Component — Deep Dive Tutorial</span>
        <div style={{marginLeft:'auto'}}>
          <Tag color={A.muted}>Tailwind v4</Tag>
        </div>
      </div>
      <div style={{
        borderBottom:`1px solid ${A.border}`, padding:'0 20px',
        display:'flex', gap:0, overflowX:'auto',
        background:'#0a0d12'
      }}>
        {CHAPTERS.map(c => (
          <button key={c.id} onClick={() => setChapter(c.id)}
            style={{
              background:'none', border:'none',
              borderBottom: chapter===c.id ? `2px solid ${A.amber}` : '2px solid transparent',
              color: chapter===c.id ? A.amber : A.muted,
              padding:'13px 18px', cursor:'pointer', fontSize:12.5, fontWeight:600,
              fontFamily:A.sans, letterSpacing:.2, whiteSpace:'nowrap',
              transition:'color .15s', flexShrink:0
            }}>{c.emoji} {c.label}</button>
        ))}
      </div>
      <div style={{ padding:'28px 28px 60px', maxWidth:960, margin:'0 auto' }}>
        {chapter==='anatomy'   && <AnatomyChapter />}
        {chapter==='cva'       && <CVAChapter />}
        {chapter==='tokens'    && <TokenChapter />}
        {chapter==='customize' && <CustomizeChapter />}
        {chapter==='filetree'  && <FileTreeChapter />}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
